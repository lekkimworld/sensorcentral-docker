services:
  redis:
    container_name: redis
    image: 'redis:7'
    restart: unless-stopped
    command: redis-server --include /usr/local/etc/redis/redis.conf --save 60 1 --loglevel warning
    ports:
     - "6379:6379"
    volumes:
      - ${PWD}/redis.conf:/usr/local/etc/redis/redis.conf
      - ${PWD}/redis:/data
    networks:
      - backend
  postgres:
    container_name: postgres
    image: 'postgres:18'
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
      - POSTGRES_HOST_AUTH_METHOD=password
    volumes:
      - ${PWD}/postgres:/var/lib/postgresql/18/docker
      - ${PWD}/00-init-sensorcentral-db.sh:/docker-entrypoint-initdb.d/00-init-sensorcentral-db.sh
    networks:
      - backend
  app:
    container_name: sensorcentral
    image: 'lekkim/sensorcentral:1.15.0-dev'
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
    networks:
      - frontend
      - backend
    environment:
      - PORT=${PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_LEVEL_LOGGERS=${LOG_LEVEL_LOGGERS}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/sensorcentral
      - DATABASE_ALLOW_SCHEMA_UPGRADE=${DATABASE_ALLOW_SCHEMA_UPGRADE:-0}
      - APP_NO_PROD_TLS=${APP_NO_PROD_TLS:-1}
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
      - APP_PROTOCOL=${APP_PROTOCOL:-http}
      - API_JWT_SECRET=${API_JWT_SECRET:-changeit}
      - SESSION_SECRET=${SESSION_SECRET:-changeit}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - OIDC_PROVIDER_URL_LOCAL=${OIDC_PROVIDER_URL_LOCAL:-http://host.docker.internal:9876}
      - OIDC_CLIENT_ID_LOCAL=${OIDC_CLIENT_ID_LOCAL:-test-client-id}
      - OIDC_CLIENT_SECRET_LOCAL=${OIDC_CLIENT_SECRET_LOCAL:-test-client-secret}
      - OIDC_REDIRECT_URI_LOCAL=${OIDC_REDIRECT_URI_LOCAL:-http://localhost:8080/openid/callback/local}
      
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge